<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#0e1a2b"/>
      <stop offset="60%" stop-color="#070a14"/>
      <stop offset="100%" stop-color="#020308"/>
    </radialGradient>
    <linearGradient id="skin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1b2540"/>
      <stop offset="100%" stop-color="#0a0f1f"/>
    </linearGradient>
    <linearGradient id="rim" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="rim2" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f472b6"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M 36 0 L 0 0 0 36" fill="none" stroke="rgba(34,211,238,0.06)" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="600" height="800" fill="url(#bg)"/>
  <rect width="600" height="800" fill="url(#grid)"/>

  <!-- ambient glow -->
  <ellipse cx="300" cy="320" rx="220" ry="220" fill="rgba(139,92,246,0.18)" filter="url(#glow)"/>
  <ellipse cx="300" cy="380" rx="180" ry="120" fill="rgba(34,211,238,0.10)" filter="url(#glow)"/>

  <!-- shoulders -->
  <path d="M60 800 C 100 580 220 540 300 540 C 380 540 500 580 540 800 Z" fill="url(#skin)"/>
  <path d="M60 800 C 100 580 220 540 300 540 C 380 540 500 580 540 800 Z"
        fill="none" stroke="url(#rim)" stroke-width="1.4" opacity="0.7"/>

  <!-- neck -->
  <rect x="270" y="460" width="60" height="100" rx="20" fill="url(#skin)"/>

  <!-- head -->
  <ellipse cx="300" cy="350" rx="120" ry="150" fill="url(#skin)"/>
  <ellipse cx="300" cy="350" rx="120" ry="150" fill="none" stroke="url(#rim)" stroke-width="1.6" opacity="0.85" filter="url(#glow)"/>

  <!-- hair -->
  <path d="M180 290 C 200 200 260 180 300 180 C 360 180 410 220 420 290 C 420 260 380 240 350 240 C 330 240 320 250 300 250 C 270 250 240 240 220 250 C 200 260 185 275 180 290 Z"
        fill="#0a0f1f" stroke="url(#rim2)" stroke-width="1" opacity="0.95"/>

  <!-- visor band (AI vibe) -->
  <rect x="190" y="330" width="220" height="30" rx="6" fill="rgba(34,211,238,0.10)"
        stroke="url(#rim)" stroke-width="1"/>
  <line x1="200" y1="345" x2="400" y2="345" stroke="#22d3ee" stroke-width="1" opacity="0.8" stroke-dasharray="4 6"/>

  <!-- circuit lines -->
  <g stroke="url(#rim)" stroke-width="1" fill="none" opacity="0.65">
    <path d="M40 120 L 140 120 L 160 140 L 220 140"/>
    <path d="M560 160 L 460 160 L 440 180 L 380 180"/>
    <path d="M40 700 L 140 700 L 160 680 L 230 680"/>
    <path d="M560 740 L 460 740 L 440 720 L 380 720"/>
  </g>
  <g fill="#22d3ee" opacity="0.9">
    <circle cx="40" cy="120" r="3"/>
    <circle cx="560" cy="160" r="3"/>
    <circle cx="40" cy="700" r="3"/>
    <circle cx="560" cy="740" r="3"/>
  </g>

  <!-- scanning highlight -->
  <rect x="0" y="380" width="600" height="2" fill="#22d3ee" opacity="0.4"/>
</svg>
